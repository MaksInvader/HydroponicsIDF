name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          
          # 1. DELETE existing configuration to start fresh
          rm -f sdkconfig
          rm -rf build
          
          # 2. Create the defaults file FIRST
          # This ensures that when we set the target, these values are baked in.
          cat <<EOF > sdkconfig.defaults
          # Hardware Revision Compatibility
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          
          # Disable Security Features that trigger version checks
          CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
          CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
          CONFIG_BOOTLOADER_APP_SECURE_VERSION=0
          
          # Enable ADC Curve Fitting Calibration (Fixes build error in sensor_telemetry.c)
          CONFIG_ADC_CALI_CURVE_FITTING_SCHEME=y
          
          # S3 Specific Optimization
          CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
          EOF

          # 3. Set the target (this will generate a new sdkconfig based on defaults)
          idf.py set-target esp32s3
          
          # 4. Synchronize version
          export APP_PROJECT_VER=${{ github.ref_name }}
          
          # 5. Build
          # We use --n-target-sys-config to ensure it doesn't try to pull system defaults over ours
          idf.py build

          # 6. Create the merged binary
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: "ESP32-S3 Firmware ${{ github.ref_name }}. Critical fix: Forced reset of secure version and ADC calibration enabled."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}