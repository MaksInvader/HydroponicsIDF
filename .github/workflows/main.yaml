name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build and Patch
        run: |
          . $IDF_PATH/export.sh

          echo "=== IDF version ==="
          idf.py --version

          rm -f sdkconfig
          rm -rf build

          printf '%s\n' \
            'CONFIG_ESP32S3_MIN_REV_FULL=0' \
            'CONFIG_ESP_REV_MIN_FULL=0' \
            'CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0' \
            'CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n' \
            'CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n' \
            'CONFIG_BOOTLOADER_APP_SECURE_VERSION=0' \
            'CONFIG_ADC_CALI_CURVE_FITTING_SCHEME=y' \
            'CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y' \
            > sdkconfig.defaults

          export APP_PROJECT_VER=${{ github.ref_name }}
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults" set-target esp32s3
          idf.py build

          APP_BIN="build/Website_Updater.bin"

          echo "=== Image info BEFORE patch ==="
          python3 $IDF_PATH/components/esptool_py/esptool/esptool.py --chip esp32s3 image_info --version 2 $APP_BIN || true

          python3 - <<PYEOF
import sys, struct

APP_BIN = 'build/Website_Updater.bin'

with open(APP_BIN, 'r+b') as f:
    data = bytearray(f.read())

if data[0] != 0xE9:
    print("ERROR: Not a valid ESP image (bad magic byte)")
    sys.exit(1)

CHIP_ID_OFFSET   = 9
EFUSE_MIN_OFFSET = 20
EFUSE_MAX_OFFSET = 22

chip_id = struct.unpack_from('<H', data, CHIP_ID_OFFSET)[0]
print(f"Chip ID: 0x{chip_id:04x} (expected 0x0009 for ESP32-S3)")

if chip_id != 0x0009:
    print(f"ERROR: Unexpected chip ID 0x{chip_id:04x}")
    sys.exit(1)

before_min = struct.unpack_from('<H', data, EFUSE_MIN_OFFSET)[0]
before_max = struct.unpack_from('<H', data, EFUSE_MAX_OFFSET)[0]
print(f"Before: efuse_blk_rev_min={before_min>>8}.{before_min&0xff}  efuse_blk_rev_max={before_max>>8}.{before_max&0xff}")

struct.pack_into('<H', data, EFUSE_MIN_OFFSET, 0)
struct.pack_into('<H', data, EFUSE_MAX_OFFSET, 0)

with open(APP_BIN, 'wb') as f:
    f.write(data)

print("Patch applied: efuse_blk_rev_min=0.0  efuse_blk_rev_max=0.0")
PYEOF

          echo "=== Image info AFTER patch ==="
          python3 $IDF_PATH/components/esptool_py/esptool/esptool.py --chip esp32s3 image_info --version 2 $APP_BIN || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/Website_Updater.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/Website_Updater.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: |
            ## ESP32-S3 Firmware ${{ github.ref_name }}

            ### OTA Update
            Use **Website_Updater.bin** — serve it from your HTTP server and point your OTA URL to it.

            ### Cable Flash (first time)
            ```
            esptool.py --chip esp32s3 -b 460800 --before default_reset --after hard_reset write_flash --flash_mode dio --flash_size 4MB --flash_freq 80m 0x0 bootloader.bin 0x8000 partition-table.bin 0x10000 Website_Updater.bin
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}