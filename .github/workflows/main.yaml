name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh

          # 1. Total cleanup
          rm -f sdkconfig
          rm -f sdkconfig.defaults
          rm -rf build

          # 2. Write sdkconfig.defaults using printf (avoids YAML heredoc conflicts)
          printf '%s\n' \
            'CONFIG_ESP32S3_MIN_REV_FULL=0' \
            'CONFIG_ESP_REV_MIN_FULL=0' \
            'CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0' \
            'CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n' \
            'CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n' \
            'CONFIG_BOOTLOADER_APP_SECURE_VERSION=0' \
            'CONFIG_ADC_CALI_CURVE_FITTING_SCHEME=y' \
            'CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y' \
            > sdkconfig.defaults

          # 3. Verify the file looks correct before building
          echo "=== sdkconfig.defaults ==="
          cat sdkconfig.defaults

          # 4. Set version before set-target
          export APP_PROJECT_VER=${{ github.ref_name }}

          # 5. Set target
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults" set-target esp32s3

          # 6. Build
          idf.py build

          # 7. Verify revision values in final sdkconfig
          echo "=== Revision / anti-rollback settings in build/sdkconfig ==="
          grep -E "MIN_REV|ANTI_ROLLBACK|SECURE_VERSION|ROLLBACK_ENABLE" build/sdkconfig

          # 8. Create merged binary
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: |
            ## ESP32-S3 Firmware ${{ github.ref_name }}

            ### Flashing
            Flash full_firmware.bin at offset 0x0:
            esptool.py --chip esp32s3 write_flash 0x0 full_firmware.bin

            ### OTA
            Serve full_firmware.bin from your HTTP server and point your OTA URL to it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}