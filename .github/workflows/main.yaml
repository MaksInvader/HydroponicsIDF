name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Using v5.3.2 (Stable LTS) for maximum reliability
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          
          # 1. Set the target
          idf.py set-target esp32s3
          
          # 2. Create a defaults file. 
          # We add CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0 to bypass the 
          # "efuse blk rev" check specifically seen in your logs.
          cat <<EOF > sdkconfig.defaults
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
          EOF

          # 3. Synchronize version
          export APP_PROJECT_VER=${{ github.ref_name }}
          
          # 4. Reconfigure using the defaults file, then build
          # We force a clean reconfigure to ensure the defaults are applied.
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults" reconfigure
          idf.py build

          # 5. Create the merged binary
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: "ESP32-S3 Firmware ${{ github.ref_name }}. Compatibility fix applied for eFuse block revision checks."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}