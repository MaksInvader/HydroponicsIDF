name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          
          # 1. Set the target
          idf.py set-target esp32s3
          
          # 2. DELETE existing sdkconfig to prevent stale settings from the repo
          # This is the most likely source of the "v82.33" requirement.
          rm -f sdkconfig
          
          # 3. Create a defaults file that forces low-version compatibility
          # We explicitly disable Anti-Rollback and reset the Secure Version.
          cat <<EOF > sdkconfig.defaults
          # Hardware Revision Compatibility
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          
          # Disable Security Features that trigger version checks
          CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
          CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
          CONFIG_BOOTLOADER_APP_SECURE_VERSION=0
          
          # S3 Specific Optimization
          CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
          EOF

          # 4. Synchronize version
          export APP_PROJECT_VER=${{ github.ref_name }}
          
          # 5. Reconfigure and Build
          # We use fullclean to ensure no old artifacts interfere
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults" fullclean
          idf.py build

          # 6. Create the merged binary
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: "ESP32-S3 Firmware ${{ github.ref_name }}. Secure Boot Anti-Rollback disabled for maximum hardware compatibility."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}