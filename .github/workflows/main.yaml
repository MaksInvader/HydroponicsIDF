name: ESP-IDF Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Triggers the release flow when you push a tag like v1.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.1 # Ensure this matches your version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build with idf.py
        run: |
          . $IDF_PATH/export.sh
          idf.py build
          
      # Optional: Merge binaries into one file for easier flashing
      - name: Merge Binaries
        run: |
          . $IDF_PATH/export.sh
          # We move into the build directory first so the paths are correct
          cd build
          esptool.py --chip esp32 merge_bin \
            -o full_firmware.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 2MB \
            0x1000 bootloader/bootloader.bin \
            0x8000 partition_table/partition-table.bin \
            0x10000 Website_test.bin

      - name: Upload Artifacts (Internal)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: build/*.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') # Only run this job if it's a tag
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            full_firmware.bin
            partition-table.bin
            bootloader.bin
          body: "Automated build for version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}