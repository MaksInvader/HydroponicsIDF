name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          
          # Set target to ESP32-S3 explicitly
          idf.py set-target esp32s3
          
          # Synchronize internal firmware version with GitHub Tag
          export APP_PROJECT_VER=${{ github.ref_name }}
          
          idf.py build
          
          # Create the single merged binary for ESP32-S3
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: "Automated firmware build for ESP32-S3 version ${{ github.ref_name }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}