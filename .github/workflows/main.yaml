name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Diagnose efuse block revision source
        run: |
          . $IDF_PATH/export.sh

          echo "=== IDF version ==="
          idf.py --version

          echo "=== Searching IDF source for efuse block revision logic ==="
          grep -rn "BLOCK_REV_MAX\|block_rev_max\|efuse_block_rev\|get_block_rev\|EFUSE_BLK_REV" \
            $IDF_PATH/components/ $IDF_PATH/tools/ \
            --include="*.py" --include="*.cmake" --include="*.c" --include="*.h" \
            -l 2>/dev/null | head -20

          echo "=== Files that set EFUSE_BLOCK_REV_MAX_FULL ==="
          grep -rn "EFUSE_BLOCK_REV_MAX_FULL" $IDF_PATH/ 2>/dev/null | head -30

          echo "=== Check host sysfs efuse values ==="
          ls /sys/bus/platform/devices/ 2>/dev/null | grep -i efuse || echo "no efuse sysfs"
          cat /sys/bus/platform/devices/*/nvmem 2>/dev/null | xxd | head -5 || echo "no nvmem"

      - name: Build
        run: |
          . $IDF_PATH/export.sh

          rm -f sdkconfig
          rm -rf build

          printf '%s\n' \
            'CONFIG_ESP32S3_MIN_REV_FULL=0' \
            'CONFIG_ESP_REV_MIN_FULL=0' \
            'CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0' \
            'CONFIG_ESP_EFUSE_BLOCK_REV_MAX_FULL=0' \
            'CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n' \
            'CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n' \
            'CONFIG_BOOTLOADER_APP_SECURE_VERSION=0' \
            'CONFIG_ADC_CALI_CURVE_FITTING_SCHEME=y' \
            'CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y' \
            > sdkconfig.defaults

          export APP_PROJECT_VER=${{ github.ref_name }}
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults" set-target esp32s3
          idf.py build

          echo "=== EFUSE_BLOCK_REV values in final sdkconfig ==="
          grep -E "EFUSE_BLOCK_REV" sdkconfig || true

          echo "=== CMake cache entries for block rev ==="
          grep -i "block_rev\|efuse" build/CMakeCache.txt || true

          echo "=== Decoded app image header ==="
          esptool.py --chip esp32s3 image_info --version 2 build/Website_Updater.bin || true

          cd build
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 4MB \
            -o full_firmware.bin \
            @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: |
            ## ESP32-S3 Firmware ${{ github.ref_name }}

            ### Flashing
            Flash full_firmware.bin at offset 0x0:
            esptool.py --chip esp32s3 write_flash 0x0 full_firmware.bin

            ### OTA
            Serve full_firmware.bin from your HTTP server and point your OTA URL to it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}