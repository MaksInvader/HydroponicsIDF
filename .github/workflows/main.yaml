name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          
          # 1. Total cleanup: Remove any existing config files and build artifacts
          rm -f sdkconfig
          rm -f sdkconfig.defaults
          rm -rf build
          
          # 2. Create the defaults file with explicit anti-rollback and revision overrides
          cat <<EOF > custom_sdkconfig.defaults
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
          CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
          CONFIG_BOOTLOADER_APP_SECURE_VERSION=0
          CONFIG_ADC_CALI_CURVE_FITTING_SCHEME=y
          CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
          EOF

          # 3. Export the defaults file path for the IDF build system
          export SDKCONFIG_DEFAULTS="custom_sdkconfig.defaults"
          
          # 4. Set target using the -D flag (correct syntax for idf.py)
          idf.py -DSDKCONFIG_DEFAULTS="custom_sdkconfig.defaults" set-target esp32s3
          
          # 5. Synchronize version
          export APP_PROJECT_VER=${{ github.ref_name }}
          
          # 6. Build 
          idf.py build

          # 7. Create the merged binary
          cd build
          esptool.py --chip esp32s3 merge_bin -o full_firmware.bin @flash_args

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/full_firmware.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/full_firmware.bin
            release_assets/partition-table.bin
            release_assets/bootloader.bin
          body: "ESP32-S3 Firmware ${{ github.ref_name }}. Compatibility fix: Corrected idf.py syntax for SDKCONFIG_DEFAULTS."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}