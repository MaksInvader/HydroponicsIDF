name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Configure and Build
        run: |
          . $IDF_PATH/export.sh

          # 1. Start fresh
          rm -f sdkconfig sdkconfig.defaults
          rm -rf build

          # 2. Create the defaults file. 
          # We use the most basic settings to ensure maximum compatibility.
          # If you use Octal Flash/PSRAM, the IDF will force a higher revision.
          cat <<EOF > sdkconfig.defaults
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
          CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
          CONFIG_BOOTLOADER_APP_SECURE_VERSION=0
          # Ensure we aren't using Octal modes which trigger high rev requirements
          CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
          CONFIG_ESPTOOLPY_FLASHFREQ_80M=y
          EOF

          # 3. Build project
          export APP_PROJECT_VER=${{ github.ref_name }}
          idf.py set-target esp32s3
          idf.py build

          # 4. VERIFICATION STEP
          # This is the most important part. Look at the logs for this step!
          echo "=== FINAL HEADER VERIFICATION ==="
          esptool.py --chip esp32s3 image_info build/*.bin | tee image_verification.txt
          
          # This grep will fail the build if the revision is NOT 0.0
          if grep -q "Min chip rev: v0.0" image_verification.txt; then
            echo "Success: Binary is compatible with all S3 revisions (v0.0)."
          else
            echo "ERROR: Binary still requires high revision! Check your PSRAM/Flash settings."
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/*.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/*.bin
          body: |
            ## ESP32-S3 Firmware ${{ github.ref_name }}
            
            ### OTA Instructions
            Use the main application binary (the one named after your project) for OTA.
            
            ### Header Verification
            This build has been verified to support **Min chip rev: v0.0**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}