name: ESP-IDF Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Configure and Build
        run: |
          . $IDF_PATH/export.sh

          # 1. Start fresh
          rm -f sdkconfig sdkconfig.defaults
          rm -rf build

          # 2. Create the defaults file with extreme compatibility settings
          cat <<EOF > sdkconfig.defaults
          CONFIG_ESP_REV_MIN_FULL=0
          CONFIG_ESP32S3_MIN_REV_FULL=0
          CONFIG_ESP_EFUSE_BLOCK_REV_MIN_FULL=0
          CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=n
          CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
          CONFIG_BOOTLOADER_APP_SECURE_VERSION=0
          # Force DIO and 40MHz/80MHz standard modes
          CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
          CONFIG_ESPTOOLPY_FLASHFREQ_80M=y
          # Force 32B cache line (Higher requirements often come from 64B)
          CONFIG_ESP32S3_DATA_CACHE_LINE_32B=y
          CONFIG_ESP32S3_INSTRUCTION_CACHE_LINE_32B=y
          EOF

          # 3. Build project
          export APP_PROJECT_VER=${{ github.ref_name }}
          idf.py set-target esp32s3
          idf.py build

          # 4. THE BYPASS: Forcefully rewrite the binary header to Rev 0.0
          # This overrides any requirements the compiler/linker tried to enforce.
          echo "=== APPLYING HEADER BYPASS ==="
          for f in build/*.bin; do
            if [ -f "$f" ]; then
              python3 $IDF_PATH/components/esptool_py/esptool/esptool.py \
                --chip esp32s3 \
                elf2bin \
                --min-rev 0 \
                -o "$f.patched" \
                "${f%.bin}.elf" && mv "$f.patched" "$f"
            fi
          done

          # 5. VERIFICATION STEP
          echo "=== FINAL HEADER VERIFICATION ==="
          # Using version 3 image_info which provides more detail in newer esptool
          esptool.py --chip esp32s3 image_info build/*.bin || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-bins
          path: |
            build/*.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32s3-bins
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/*.bin
          body: |
            ## ESP32-S3 Firmware ${{ github.ref_name }}
            
            ### OTA Instructions
            Use the main application binary for OTA.
            
            ### Header Verification
            This build has been forcefully patched to **Min chip rev: v0.0**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}